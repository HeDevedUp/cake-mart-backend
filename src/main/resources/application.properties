# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/cakemart
spring.datasource.username=admin
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

# JWT
jwt.secret=MySuperSecretKeyForJwtThatIsAtLeast32CharactersLong12345
jwt.expiration-ms=86400000

# Stripe (replace with your real Stripe secret key to enable payments)
stripe.secret.key=YOUR_SECRET_KEY

# Logging
logging.level.com.cakemart=DEBUG
